[package]
name = "gatekeeper"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait="0.1"
pingora = { version = "0.4", features = [ "lb" ] }
pingora-core = "0.4"
pingora-load-balancing = "0.4"
pingora-proxy = "0.4"
pingora-http = "0.4"
serde = "1.0.217"
serde_json = "1.0.138"
mongodb = {version = "3.2.1", features = ["sync"]}
tokio = {version = "1.43.0", features = ["macros", "rt-multi-thread"] }
vaultrs = "0.7.3"
chrono = "0.4.39"
futures = "0.3.31"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
bytes = "1.10.0"
