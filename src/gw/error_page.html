      --color-blue-700: #1967d2;

    @media (max-width: 700px) {
      :root {
        --card-width: 100%;
      }

      .card-container {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
      }

      .card {
        display: flow-root;
      }

      .card-content {
        padding-top: 32px;
      }
    }

    @media (min-width: 701px) and (max-height: 700px) {
      .card-container {
        top: 20px !important;
        transform: translate(-50%, 0%) !important;
      }
    }

    @media (min-width: 701px) {
      :root {
        --card-width: 640px;
      }

      .card {
        border-radius: 8px;
        box-shadow: 0 1px 2px 0px rgba(60, 64, 67, 0.3),
          0 1px 3px 1px rgba(60, 64, 67, 0.15);
      }

      .card-container {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .card-content {
        padding: 48px 40px 48px 40px;
      }
    }

    ::-webkit-scrollbar {
      width: 16px;
    }

    ::-webkit-scrollbar-thumb {
      border-radius: 16px;
      border: solid 4px rgba(0, 0, 0, 0);
      background: var(--color-grey-300);
      background-clip: padding-box;
    }

    html {
      font: 14px/22px 'Roboto Mono', monospace;
    }

    .card {
      width: var(--card-width);
      height: var(--card-height);
      color: var(--color-grey-700);
    }

    .card-content {
      height: calc(100% - 100px);
    }

    .title {
      color: var(--color-grey-900);
      margin: 4px 0px 8px 0px;
      font-size: 24px;
      line-height: 32px;
      font-weight: normal;
    }

    .description {
      color: var(--color-blue-700);
      margin: 0px 0px 24px 0px;

      font-size: 14px;
      line-height: 24px;
      font-weight: normal;
    }

    .description>ul {
      text-align: left;
    }

    .details-container {
      width: 100%;
      height: 60%;
      font-size: 14px;
      line-height: 16px;
    }

    .details-button-container {
      display: inline-grid;
      font-weight: 600;
      margin-top: 10px;
      margin-left: 24px;
      margin-right: 24px;
      overflow: auto;
    }

    .details-header {
      float: left;
      padding-left: 0px !important;
      width: 75%;
    }

    .details-button-container>span {
      padding: 8px;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .center {
      text-align: center;
    }

    .error-details {
      color: var(--color-blue-300);
      font-weight: normal;
      margin-top: 8px;
      margin-left: 24px;
      width: inherit;
      word-wrap: break-word;
    }

    .logo {
      border: 0;
      margin: 0px auto;
      margin-bottom: 0.325em;
      width: 75px;
      height: 75px;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
